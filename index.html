<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sims Tail Creature</title>
  </head>
  <body>
    <main id="app">
      <section class="hud">
        <div>
          <p class="eyebrow">Sims-style morphology</p>
          <h1 id="creatureName">Tail swimmer A-001</h1>
        </div>
        <div class="panel" aria-label="creature controls">
          <div class="metrics">
            <p>gen <span id="generationValue">0</span></p>
            <p>phase <span id="phaseValue">0.00</span></p>
            <p>stability <span id="stabilityValue">0.82</span></p>
          </div>
          <div class="controls">
            <button id="stableBtn" type="button">stable</button>
            <button id="mutateBtn" type="button">mutate</button>
            <button id="crawlerBtn" type="button">crawler</button>
          </div>
        </div>
      </section>
      <canvas id="scene"></canvas>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
